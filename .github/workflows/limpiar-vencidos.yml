name: Limpiar anuncios vencidos

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  limpiar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
        working-directory: scripts/limpiar-vencidos
      - run: node index.js
        working-directory: scripts/limpiar-vencidos
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
